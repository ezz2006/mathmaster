<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Admin Dashboard</title>
   
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css">
   <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
   <section class="flex">
      <a href="index.html" class="logo">MathMastery</a>
      <form action="search.html" method="post" class="search-form">
         <input type="text" name="search_box" required placeholder="search courses..." maxlength="100">
         <button type="submit" class="fas fa-search"></button>
      </form>
      <div class="icons">
         <div id="menu-btn" class="fas fa-bars"></div>
         <div id="search-btn" class="fas fa-search"></div>
         <div id="user-btn" class="fas fa-user"></div>
         <div id="toggle-btn" class="fas fa-sun"></div>
      </div>
      <div class="profile">
         <img src="images/pic-1.jpg" class="image" alt="">
         <h3 class="name">Guest</h3>
         <p class="role">guest</p>
         <a href="profile.html" class="btn">view profile</a>
         <div class="flex-btn">
            <a href="login.html" class="option-btn">login</a>
            <a href="register.html" class="option-btn">register</a>
         </div>
      </div>
   </section>
</header>   

<div class="side-bar">
   <div id="close-btn">
      <i class="fas fa-times"></i>
   </div>
   <div class="profile">
      <img src="images/pic-1.jpg" class="image" alt="">
      <h3 class="name">Guest</h3>
      <p class="role">guest</p>
      <a href="profile.html" class="btn">view profile</a>
   </div>
   <nav class="navbar">
      <a href="index.html"><i class="fas fa-home"></i><span>home</span></a>
      <a href="about.html"><i class="fas fa-question"></i><span>about</span></a>
      <a href="courses.html"><i class="fas fa-graduation-cap"></i><span>courses</span></a>
      <a href="teachers.html"><i class="fas fa-chalkboard-user"></i><span>teachers</span></a>
      <a href="contact.html"><i class="fas fa-headset"></i><span>contact us</span></a>
   </nav>
</div>

<section class="form-container" style="min-height: auto;">
   <form id="create-course-form">
      <h3>Create New Course</h3>
      <p>Course Title <span>*</span></p>
      <input type="text" name="title" required maxlength="100" class="box">
      <p>Thumbnail Image URL (e.g., images/thumb-1.png) <span>*</span></p>
      <input type="text" name="thumbnail" value="images/thumb-1.png" required class="box">
      <input type="submit" value="create course" class="btn">
   </form>
</section>

<section class="courses">
   <h1 class="heading">your courses</h1>
   <div class="box-container" id="admin-courses-container">
      <!-- dynamically loaded -->
   </div>
</section>

<footer class="footer">
   &copy; Mr:Ezz EL-Din <span>+201125400389</span> 
</footer>

<script src="js/store.js"></script>
<script src="js/auth.js"></script>
<script src="js/script.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const currentUser = getCurrentUser();
        if(!currentUser || currentUser.role !== 'admin'){
            window.location.href = 'index.html'; // Redirect students away
        }

        renderAdminCourses();

        document.getElementById('create-course-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const title = document.querySelector('input[name="title"]').value;
            const thumbnail = document.querySelector('input[name="thumbnail"]').value;
            
            const courses = getCourses();
            const newCourse = {
                id: generateId(),
                title,
                thumbnail,
                teacherId: currentUser.id,
                teacherName: currentUser.name,
                videos: [] // array of video objects
            };
            
            courses.push(newCourse);
            saveCourses(courses);
            
            alert('Course created successfully!');
            document.querySelector('input[name="title"]').value = '';
            renderAdminCourses();
        });
    });

    function renderAdminCourses() {
        const currentUser = getCurrentUser();
        const courses = getCourses(); // Single admin manages all courses
        const container = document.getElementById('admin-courses-container');
        
        if (courses.length === 0) {
            container.innerHTML = '<p class="empty">You have not created any courses yet.</p>';
            return;
        }

        container.innerHTML = courses.map(course => `
            <div class="box">
                <div class="thumb">
                    <img src="${course.thumbnail}" alt="">
                    <span>${course.videos.length} videos</span>
                </div>
                <h3 class="title">${course.title}</h3>
                <a href="playlist.html?id=${course.id}" class="inline-btn">view/edit playlist</a>
            </div>
        `).join('');
    }
</script>

</body>
</html>
