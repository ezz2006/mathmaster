<!-- Dynamic Container -->
<section class="form-container" style="min-height: auto; max-width: 800px; margin: 0 auto; padding-top: 3rem;" id="quiz-container">
    <p style="font-size: 2rem; text-align: center;">Loading Quiz...</p>
</section>

<script src="js/script.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const courseId = urlParams.get('courseId');
    const videoId = urlParams.get('videoId');
    
    if (!courseId || !videoId) {
        document.getElementById('quiz-container').innerHTML = '<h3>Quiz not found.</h3>';
        return;
    }

    const courses = getCourses();
    const course = courses.find(c => c.id === courseId);
    if (!course || !course.videos) return;

    const video = course.videos.find(v => v.id === videoId);
    if (!video) return;

    const isOwner = currentUser && currentUser.role === 'admin';

    // Initialize quizzes array on video if it doesn't exist
    if (!video.questions) {
        video.questions = [];
    }

    const container = document.getElementById('quiz-container');

    if (isOwner) {
        // Admin View: Add/Manage questions
        renderAdminQuizView(course, video, courses);
    } else {
        // Student View: Take Quiz
        renderStudentQuizView(course, video);
    }
});

function renderAdminQuizView(course, video, allCourses) {
    const container = document.getElementById('quiz-container');
    
    let html = `
        <h3 style="font-size: 2.5rem; color: var(--black); text-align: center; margin-bottom: 2rem;">Manage Quiz for: ${video.title}</h3>
        
        <div style="display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem;">
            <button id="preview-btn" class="inline-btn" style="background-color: var(--orange);">Preview as Student</button>
            <label class="inline-btn" style="background-color: var(--main-color); cursor: pointer;">
                Import JSON
                <input type="file" id="import-json" accept=".json" style="display: none;">
            </label>
        </div>
        
        <form id="add-question-form" style="background-color: var(--white); padding: 2rem; border-radius: .5rem; box-shadow: var(--box-shadow); margin-bottom: 3rem;">
            <h4 id="form-title" style="font-size: 2rem; color: var(--black); border-bottom: var(--border); padding-bottom: 1rem; margin-bottom: 1.5rem;">Add New Question</h4>
            <input type="hidden" id="edit-q-id" value="">
            
            <p style="font-size: 1.5rem; color: var(--light-color);">Question Text <span style="color: var(--red);">*</span></p>
            <input type="text" name="q_text" required class="box" style="width: 100%; border-radius: .5rem; padding: 1.2rem; font-size: 1.6rem; color: var(--black); margin-bottom: 1rem; background-color: var(--light-bg);">
            
            <p style="font-size: 1.5rem; color: var(--light-color);">Option A <span style="color: var(--red);">*</span></p>
            <input type="text" name="opt_a" required class="box" style="width: 100%; border-radius: .5rem; padding: 1.2rem; font-size: 1.6rem; margin-bottom: 1rem; background-color: var(--light-bg);">
            
            <p style="font-size: 1.5rem; color: var(--light-color);">Option B <span style="color: var(--red);">*</span></p>
            <input type="text" name="opt_b" required class="box" style="width: 100%; border-radius: .5rem; padding: 1.2rem; font-size: 1.6rem; margin-bottom: 1rem; background-color: var(--light-bg);">
            
            <p style="font-size: 1.5rem; color: var(--light-color);">Option C <span style="color: var(--red);">*</span></p>
            <input type="text" name="opt_c" required class="box" style="width: 100%; border-radius: .5rem; padding: 1.2rem; font-size: 1.6rem; margin-bottom: 1rem; background-color: var(--light-bg);">
            
            <p style="font-size: 1.5rem; color: var(--light-color);">Option D <span style="color: var(--red);">*</span></p>
            <input type="text" name="opt_d" required class="box" style="width: 100%; border-radius: .5rem; padding: 1.2rem; font-size: 1.6rem; margin-bottom: 1rem; background-color: var(--light-bg);">
            
            <p style="font-size: 1.5rem; color: var(--light-color);">Correct Answer <span style="color: var(--red);">*</span></p>
            <select name="correct" required class="box" style="width: 100%; border-radius: .5rem; padding: 1.2rem; font-size: 1.6rem; margin-bottom: 2rem; background-color: var(--light-bg);">
                <option value="A">Option A</option>
                <option value="B">Option B</option>
                <option value="C">Option C</option>
                <option value="D">Option D</option>
            </select>
            
            <input type="submit" id="submit-q-btn" value="add question" class="btn">
            <button type="button" id="cancel-edit-btn" class="inline-option-btn" style="display: none;">cancel edit</button>
        </form>

        <div id="questions-list">
    `;

    if (video.questions.length === 0) {
        html += `<p style="font-size: 1.8rem; color: var(--light-color); text-align: center;">No questions added yet.</p>`;
    } else {
        html += video.questions.map((q, index) => `
            <div style="background-color: var(--white); padding: 2rem; border-radius: .5rem; box-shadow: var(--box-shadow); margin-bottom: 1.5rem;">
                <h4 style="font-size: 1.8rem; color: var(--black); margin-bottom: 1rem;">${index + 1}. ${q.text}</h4>
                <ul style="font-size: 1.5rem; color: var(--light-color); margin-bottom: 1rem; list-style: inside;">
                    <li ${q.correct === 'A' ? 'style="color: var(--main-color); font-weight: bold;"' : ''}>A: ${q.options.A}</li>
                    <li ${q.correct === 'B' ? 'style="color: var(--main-color); font-weight: bold;"' : ''}>B: ${q.options.B}</li>
                    <li ${q.correct === 'C' ? 'style="color: var(--main-color); font-weight: bold;"' : ''}>C: ${q.options.C}</li>
                    <li ${q.correct === 'D' ? 'style="color: var(--main-color); font-weight: bold;"' : ''}>D: ${q.options.D}</li>
                </ul>
                <div style="margin-top: 1.5rem;">
                    <button class="inline-option-btn edit-q-btn" data-id="${q.id}">Edit</button>
                    <button class="inline-delete-btn del-q-btn" data-id="${q.id}">Delete</button>
                </div>
            </div>
        `).join('');
    }

    html += `</div>
        <div style="text-align: center; margin-top: 2rem;">
            <a href="watch-video.html?courseId=${course.id}&videoId=${video.id}" class="inline-btn">Back to Video</a>
        </div>
    `;
    container.innerHTML = html;

    // --- EVENT LISTENERS ---

    // 1. Preview Button
    document.getElementById('preview-btn').addEventListener('click', () => {
        // Temporarily go to student view, passing flag so they can go back
        renderStudentQuizView(course, video, true, allCourses);
    });

    // 2. Import JSON
    document.getElementById('import-json').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const importedQuestions = JSON.parse(evt.target.result);
                if (Array.isArray(importedQuestions)) {
                    // map them to correct format if needed, generate IDs
                    const parsed = importedQuestions.map(q => ({
                        id: generateId(),
                        text: q.text || q.question || '',
                        options: {
                            A: q.options?.A || q.A || '',
                            B: q.options?.B || q.B || '',
                            C: q.options?.C || q.C || '',
                            D: q.options?.D || q.D || ''
                        },
                        correct: q.correct || q.answer || 'A'
                    }));
                    video.questions = video.questions.concat(parsed);
                    
                    const cIndex = allCourses.findIndex(c => c.id === course.id);
                    allCourses[cIndex] = course;
                    saveCourses(allCourses);
                    
                    alert('Questions imported successfully!');
                    renderAdminQuizView(course, video, allCourses);
                } else {
                    alert('Invalid JSON format. Expected an array of questions.');
                }
            } catch (err) {
                alert('Error parsing JSON file: ' + err.message);
            }
        };
        reader.readAsText(file);
    });

    // 3. Edit Buttons
    document.querySelectorAll('.edit-q-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const id = this.getAttribute('data-id');
            const q = video.questions.find(x => x.id === id);
            if (q) {
                document.getElementById('form-title').textContent = 'Edit Question';
                document.getElementById('submit-q-btn').value = 'update question';
                document.getElementById('edit-q-id').value = q.id;
                document.getElementById('cancel-edit-btn').style.display = 'inline-block';
                
                const form = document.getElementById('add-question-form');
                form.querySelector('input[name="q_text"]').value = q.text;
                form.querySelector('input[name="opt_a"]').value = q.options.A;
                form.querySelector('input[name="opt_b"]').value = q.options.B;
                form.querySelector('input[name="opt_c"]').value = q.options.C;
                form.querySelector('input[name="opt_d"]').value = q.options.D;
                form.querySelector('select[name="correct"]').value = q.correct;
                
                form.scrollIntoView({ behavior: 'smooth' });
            }
        });
    });

    // Cancel Edit Button
    document.getElementById('cancel-edit-btn').addEventListener('click', function() {
        document.getElementById('form-title').textContent = 'Add New Question';
        document.getElementById('submit-q-btn').value = 'add question';
        document.getElementById('edit-q-id').value = '';
        this.style.display = 'none';
        document.getElementById('add-question-form').reset();
    });

    // 4. Delete Buttons
    document.querySelectorAll('.del-q-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            if (confirm('Are you sure you want to delete this question?')) {
                const id = this.getAttribute('data-id');
                video.questions = video.questions.filter(x => x.id !== id);
                
                const cIndex = allCourses.findIndex(c => c.id === course.id);
                allCourses[cIndex] = course;
                saveCourses(allCourses);
                
                renderAdminQuizView(course, video, allCourses);
            }
        });
    });

    // 5. Form Submit (Add or Update)
    document.getElementById('add-question-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const text = this.querySelector('input[name="q_text"]').value;
        const A = this.querySelector('input[name="opt_a"]').value;
        const B = this.querySelector('input[name="opt_b"]').value;
        const C = this.querySelector('input[name="opt_c"]').value;
        const D = this.querySelector('input[name="opt_d"]').value;
        const correct = this.querySelector('select[name="correct"]').value;
        
        const editId = document.getElementById('edit-q-id').value;

        if (editId) {
            // Update
            const qIndex = video.questions.findIndex(x => x.id === editId);
            if (qIndex > -1) {
                video.questions[qIndex] = {
                    id: editId,
                    text,
                    options: { A, B, C, D },
                    correct
                };
                alert('Question updated!');
            }
        } else {
            // Add
            video.questions.push({
                id: generateId(),
                text,
                options: { A, B, C, D },
                correct
            });
            alert('Question added!');
        }

        // Save
        const cIndex = allCourses.findIndex(c => c.id === course.id);
        allCourses[cIndex] = course;
        saveCourses(allCourses);

        renderAdminQuizView(course, video, allCourses);
    });
}

function renderStudentQuizView(course, video, isPreview = false, allCourses = []) {
    const container = document.getElementById('quiz-container');

    if (!video.questions || video.questions.length === 0) {
        container.innerHTML = `
            <h3 style="font-size: 2.5rem; color: var(--black); text-align: center; margin-bottom: 2rem;">Quiz: ${video.title}</h3>
            <p style="font-size: 1.8rem; color: var(--light-color); text-align: center;">The teacher has not added any questions to this quiz yet.</p>
            <div style="text-align: center; margin-top: 2rem;">
                ${isPreview ? 
                    `<button type="button" class="btn" id="exit-preview-btn">Exit Preview</button>` :
                    `<a href="watch-video.html?courseId=${course.id}&videoId=${video.id}" class="btn">Back to Video</a>`
                }
            </div>
        `;
        if (isPreview) {
            document.getElementById('exit-preview-btn').addEventListener('click', () => {
                renderAdminQuizView(course, video, allCourses);
            });
        }
        return;
    }

    let html = `
        <h3 style="font-size: 2.5rem; color: var(--black); text-align: center; margin-bottom: 2rem;">Quiz: ${video.title} ${isPreview ? '<span style="color:var(--orange);">(Preview Mode)</span>' : ''}</h3>
        <form id="take-quiz-form" style="background-color: var(--white); padding: 2rem; border-radius: .5rem; box-shadow: var(--box-shadow);">
    `;

    video.questions.forEach((q, index) => {
        html += `
            <div style="margin-bottom: 2.5rem; border-bottom: var(--border); padding-bottom: 1.5rem;">
                <h4 style="font-size: 1.8rem; color: var(--black); margin-bottom: 1rem;">${index + 1}. ${q.text}</h4>
                
                <label style="display: block; font-size: 1.6rem; color: var(--light-color); margin-bottom: .8rem; cursor: pointer;">
                    <input type="radio" name="q_${q.id}" value="A" required> ${q.options.A}
                </label>
                <label style="display: block; font-size: 1.6rem; color: var(--light-color); margin-bottom: .8rem; cursor: pointer;">
                    <input type="radio" name="q_${q.id}" value="B"> ${q.options.B}
                </label>
                <label style="display: block; font-size: 1.6rem; color: var(--light-color); margin-bottom: .8rem; cursor: pointer;">
                    <input type="radio" name="q_${q.id}" value="C"> ${q.options.C}
                </label>
                <label style="display: block; font-size: 1.6rem; color: var(--light-color); margin-bottom: .8rem; cursor: pointer;">
                    <input type="radio" name="q_${q.id}" value="D"> ${q.options.D}
                </label>
            </div>
        `;
    });

    html += `
            <input type="submit" value="Submit Quiz" class="btn">
            ${isPreview ? 
                `<button type="button" class="inline-option-btn" id="exit-preview-btn">Exit Preview</button>` :
                `<a href="watch-video.html?courseId=${course.id}&videoId=${video.id}" class="inline-option-btn">Back to Video</a>`
            }
        </form>
        <div id="quiz-result" style="display: none; background-color: var(--white); padding: 2rem; border-radius: .5rem; box-shadow: var(--box-shadow); margin-top: 2rem; text-align: center;">
            <h3 style="font-size: 3rem; color: var(--main-color); margin-bottom: 1rem;" id="score-display"></h3>
            <p style="font-size: 1.6rem; color: var(--light-color); margin-bottom: 2rem;" id="feedback-display"></p>
            ${isPreview ? 
                `<button type="button" class="btn" id="exit-preview-btn-2">Exit Preview</button>` :
                `<a href="watch-video.html?courseId=${course.id}&videoId=${video.id}" class="btn">Back to Video</a>`
            }
        </div>
    `;

    container.innerHTML = html;

    if (isPreview) {
        document.getElementById('exit-preview-btn').addEventListener('click', () => {
            renderAdminQuizView(course, video, allCourses);
        });
        document.getElementById('exit-preview-btn-2').addEventListener('click', () => {
            renderAdminQuizView(course, video, allCourses);
        });
    }

    document.getElementById('take-quiz-form').addEventListener('submit', function(e) {
        e.preventDefault();
        let score = 0;
        const total = video.questions.length;
        let reviewHtml = '<div style="margin-top: 3rem; text-align: left;">';

        video.questions.forEach((q, index) => {
            const selected = document.querySelector(`input[name="q_${q.id}"]:checked`);
            const isCorrect = selected && selected.value === q.correct;
            
            if (isCorrect) {
                score++;
            }

            reviewHtml += `
                <div style="background-color: var(--light-bg); padding: 1.5rem; border-radius: .5rem; margin-bottom: 1.5rem; border-left: .5rem solid ${isCorrect ? 'var(--main-color)' : 'var(--red)'};">
                    <h4 style="font-size: 1.8rem; color: var(--black); margin-bottom: 1rem;">${index + 1}. ${q.text}</h4>
            `;

            if (isCorrect) {
                reviewHtml += `<p style="font-size: 1.6rem; color: var(--main-color); font-weight: bold;"><i class="fas fa-check"></i> Your answer: ${q.options[selected.value]}</p>`;
            } else {
                const userAnsText = selected ? q.options[selected.value] : 'No answer provided';
                reviewHtml += `
                    <p style="font-size: 1.6rem; color: var(--red); margin-bottom: .5rem;"><i class="fas fa-times"></i> Your answer: ${userAnsText}</p>
                    <p style="font-size: 1.6rem; color: var(--main-color); font-weight: bold;"><i class="fas fa-check"></i> Correct answer: ${q.options[q.correct]}</p>
                `;
            }
            reviewHtml += `</div>`;
        });
        
        reviewHtml += '</div>';

        const resultDiv = document.getElementById('quiz-result');
        const scoreDisplay = document.getElementById('score-display');
        const feedbackDisplay = document.getElementById('feedback-display');

        this.style.display = 'none'; // hide form
        resultDiv.style.display = 'block';
        scoreDisplay.textContent = `You scored ${score} out of ${total}!`;
        
        if (score === total) {
            feedbackDisplay.innerHTML = "Perfect! Great job!" + reviewHtml;
        } else if (score >= total / 2) {
            feedbackDisplay.innerHTML = "Good effort. Review the lesson to get a perfect score next time." + reviewHtml;
        } else {
            feedbackDisplay.innerHTML = "Don't give up! Watch the video again and retry." + reviewHtml;
        }
    });
}
</script>
